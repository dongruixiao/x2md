<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>x2md Desktop</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="mark">x2</div>
        <div>
          <strong>x2md</strong>
          <span>Desktop</span>
        </div>
      </div>
      <div class="service-state" id="serviceBadge" data-state="starting">
        <span class="pulse"></span>
        <span id="serviceStatus">桌面壳已启动</span>
      </div>
    </header>

    <main class="startup">
      <section class="startup-panel">
        <p class="eyebrow">本地服务</p>
        <h1 id="serviceTitle">正在启动 x2md</h1>
        <p id="serviceHint">启动完成后会自动进入转换界面。</p>
        <div class="command-box" id="commandBox" hidden>
          <span>启动命令</span>
          <code id="serviceCommand"></code>
        </div>
        <div class="log-panel" id="logPanel" hidden>
          <div class="log-head">
            <span>最近日志</span>
            <button type="button" id="clearLogs">清空</button>
          </div>
          <pre id="serviceLogs"></pre>
        </div>
        <button type="button" id="retryService" hidden>重试启动</button>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
